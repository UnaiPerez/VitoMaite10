<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Búsqueda por Geolocalización</title>
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/busquedaGeo.css">
    <style>
        #map {
            width: 100%;
            height: 500px;
        }
        .controls {
            margin: 20px 0;
        }
        .controls label {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <h1>Búsqueda de usuarios cercanos</h1>
    <div class="controls">
        <label for="radius">Selecciona el radio (km):</label>
        <input type="range" id="radius" min="0.5" max="2" step="0.5" value="1">
        <span id="radius-value">1 km</span>
    </div>
    <div id="map"></div>

    <script src="https://maps.googleapis.com/maps/api/js?key=TU_CLAVE_DE_API"></script>
    <script src="js/busqGeo.js"></script>
</body>
</html>
