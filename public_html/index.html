<!DOCTYPE html>
<html>
    <head>
        <title>VitoMait10 - Encuentra el amor</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel='stylesheet' href="css/style.css">
    </head>
    <body>
        <!-- Header -->
        <header class='header'>
            <img src='images/logo.png' alt="Logo de VitoMaite10" class='logo'>
            <h1 class='header-title'>VitoMaite</h1>
            <a href="login.html" class="btn-login">Login</a>
        </header>
               
        <!-- Main -->
        <main class='main-content'>
            <div class='search-container'>
                <h2>Buscar Solteros/as</h2>
                <form id='form-group'>
                    <div class='form-group'>
                        <label for="gender-search">¿Qué estoy buscando?</label>
                        <select id='gender-search' class="input-field">
                            <option value="" disabled selected>¿Que buscas?</option>
                            <option value="H-M">Soy hombre y busco mujer</option>
                            <option value="H-H">Soy hombre y busco hombre</option>
                            <option value="H-A">Soy hombre y busco ambos</option>
                            <option value="M-M">Soy mujer y busco mujer</option>
                            <option value="M-H">Soy mujer y busco hombre</option>
                            <option value="M-A">Soy mujer y busco ambos</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for='age-min'>Edad mínima</label>
                        <input type='number' id='age-min' class="input-field" min='18' max='100'>
                    </div>
                    <div class="form-group">
                        <label for='age-max'>Edad máxima</label>
                        <input type='number' id='age-max' class="input-field" min='18' max='100'>
                    </div>
                    <div class="form-group">
                        <label for="city-select">Ciudad</label>
                        <select id="city-select" class="input-field">
                            <option value="" disabled selected>Selecciona una ciudad</option>
                            <option value="Vitoria">Vitoria</option>
                            <option value="Bilbao">Bilbao</option>
                            <option value="Donosti">Donosti</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-search">Buscar</button>
                </form>
            </div>
        </main>
        
        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2024 VitoMaite10 - Encuentra el amor</p>
            <p>
                Síguenos en:
                <a href="#">Facebook</a>
                <a href="#">Twitter</a>
                <a href="#">Instagram</a>
            </p>
        </footer>
    </body>
</html>
