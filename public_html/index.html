<html>
    <head>
        <title>VitoMait10 - Encuentra el amor</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel='stylesheet' href="css/style.css">
    </head>
    <body>
        <!-- Header -->
        <header class='header'>
            <img src='images/logo.png' alt="Logo de VitoMaite10" class='logo'>
            <h1 class='header-title'>VitoMaite</h1>
            <button class="btn-login">Login</button>
        </header>
        
        <!-- comment -->
        <div class='functionalities'>
            <a href='modificarPerfil.html'>Modificar Perfil</a>
            <a href='Aficiones.html'>Aficiones</a>
            <a href='BusquedaAvanzada.html'>Busqueda Avanzada</a>
            <a href='verLikes.html'>Ver likes</a>
        </div>
        
        <!-- Main -->
        <main class='main-content'>
            <div class='search-container'>
                <h2>Buscar Solteros/as</h2>
                <form id='form-group'>
                    <div class='form-group'>
                        <label for="gender-search">¿Que estoy buscando?</label>
                        <select id='gender-search' class="input-field">
                            <option value="H-M">Soy hombre y busco mujer</option>
                            <option value="H-H">Soy hombre y busco hombre</option>
                            <option value="H-A">Soy hombre y busco ambos</option>
                            <option value="M-M">Soy mujer y busco mujer</option>
                            <option value="M-H">Soy mujer y busco hombre</option>
                            <option value="M-A">Soy mujer y busco ambos</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for='age-min'>Edad minima</label>
                        <input type='number' id='age-min' class="input-field" min='18' max='100'>
                    </div>
                    <div class="form-group">
                        <label for='age-max'>Edad maxima</label>
                        <input type='number' id='age-max' class="input-field" min='18' max='100'>
                    </div>
                    <div class="form-group">
                        <label>Ciudad</label>
                        <div class='city-options'>
                            <label><input type='checkbox' value='Vitoria'>Vitoria</label>
                            <label><input type='checkbox' value='Bilbao'>Bilbao</label>
                            <label><input type='checkbox' value='Donosti'>Donosti</label>
                        </div>
                    </div>
                    <button type="submit" class="btn-search">Buscar</button>
                </form>
            </div>
        </main>
        
        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2024 VitoMaite10 - Encuentra el amor</p>
            <p>
                Siguenos en:
                <a href="#">Faceboook</a>

                <a href="#">Instagram</a>
            </p>
        </footer>
    </body>
