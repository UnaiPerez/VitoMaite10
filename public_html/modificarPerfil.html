<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modificar Perfil - VitoMaite10</title>
    <link rel="stylesheet" href="css/modificarPerfil.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <img src="images/logo.png" alt="Logo de VitoMaite10" class="logo">
        <h1 class="header-title">Modificar Perfil</h1>
        <a href="pantallaLogueado.html" class="btn-accept">Volver al inicio</a>
    </header>
    
    <!-- Main -->
    <main class="profile-container">
        <h2>Modifica tu Perfil</h2>
        <form id="profile-form">
            <!-- Foto del perfil -->
            <div class="form-group">
                <label for="profile-photo">Foto de Perfil</label>
                <div id="drop-area">
                    <p>Arrastra una imagen aquí o haz clic para seleccionarla</p>
                    <input type="file" id="file-input" accept="image/*" hidden>
                </div>
                <img id="preview-img" alt="Vista previa de la imagen" hidden>
            </div>

            <!-- Selección de ciudad -->
            <div class="form-group">
                <label for="city">Ciudad</label>
                <select id="city" class="input-field" required>
                    <option value="" disabled selected>Selecciona una ciudad</option>
                    <option value="Vitoria">Vitoria</option>
                    <option value="Bilbao">Bilbao</option>
                    <option value="Donosti">Donosti</option>
                </select>
            </div>

            <!-- Botones -->
            <div class="form-buttons">
                <button type="submit" class="btn-accept">Aceptar</button>
                <button type="reset" class="btn-cancel">Cancelar</button>
            </div>
        </form>
    </main>
    
    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 VitoMaite10 - Encuentra tu pareja ideal</p>
    </footer>
    
    <script src="js/modificarPerfil.js"></script>
</body>
</html>
